<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoamLab | 發佈到 IG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        @keyframes pulse-ring { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.03)} }
        #btn-go { animation: pulse-ring 2.5s ease-in-out infinite; }
        #btn-go:active { animation: none; transform: scale(.97); }
        #btn-go.done { animation: none; background: #16a34a; }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen pb-16">

    <!-- Loading -->
    <div id="loading-state" class="flex flex-col items-center justify-center min-h-screen gap-4">
        <svg class="w-10 h-10 text-[#e1306c] animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-white/40 text-sm">載入中...</p>
    </div>

    <!-- 主內容 -->
    <div id="main-content" class="hidden w-full max-w-md flex flex-col">

        <!-- 頂部品牌 -->
        <div class="flex items-center justify-center gap-2 py-5 px-4">
            <svg class="w-4 h-4 text-[#e1306c] shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
            <span class="text-[13px] font-bold text-white/60 tracking-widest uppercase">LoamLab × Instagram</span>
        </div>

        <!-- 渲染圖（橫向捲動，iOS 可長按存圖） -->
        <div id="img-section" class="hidden relative w-full">
            <div id="img-strip" class="flex gap-2 overflow-x-auto px-4 pb-1" style="-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory"></div>
            <div id="img-hint" class="py-1.5 px-3 text-[10px] text-white/40 text-center">
                長按圖片可存入相簿（iOS）
            </div>
        </div>

        <!-- 步驟橫條（按完按鈕後顯示） -->
        <div id="steps-bar" class="hidden px-4 pt-4">
            <div class="bg-white/5 border border-white/10 rounded-2xl px-4 py-3 flex flex-col gap-2">
                <div class="text-[11px] font-bold text-white/60 tracking-wider uppercase mb-0.5">接下來的步驟</div>
                <div id="step-1" class="flex items-start gap-2.5">
                    <span class="shrink-0 w-5 h-5 rounded-full bg-[#e1306c]/20 border border-[#e1306c]/40 text-[10px] font-bold text-[#e1306c] flex items-center justify-center mt-0.5">1</span>
                    <span id="step-1-text" class="text-[12px] text-white/70 leading-snug">在分享選單中點選 <span class="text-[#e1306c] font-bold">Instagram</span></span>
                </div>
                <div class="flex items-start gap-2.5">
                    <span class="shrink-0 w-5 h-5 rounded-full bg-white/10 border border-white/20 text-[10px] font-bold text-white/50 flex items-center justify-center mt-0.5">2</span>
                    <span class="text-[12px] text-white/50 leading-snug">在 IG 貼文框貼上文字（已自動複製）</span>
                </div>
                <div class="flex items-start gap-2.5">
                    <span class="shrink-0 w-5 h-5 rounded-full bg-white/10 border border-white/20 text-[10px] font-bold text-white/50 flex items-center justify-center mt-0.5">3</span>
                    <span id="step-3-text" class="text-[12px] text-white/50 leading-snug">邀請 <span class="text-[#e1306c]">@loamlab_barbarian</span> 協作 → 獲得獎勵</span>
                </div>
            </div>
        </div>

        <!-- 一鍵大按鈕 -->
        <div class="px-4 pt-4">
            <button id="btn-go"
                class="w-full py-5 rounded-2xl bg-gradient-to-r from-[#833ab4] via-[#fd1d1d] to-[#fcb045] text-white font-bold text-[15px] tracking-wider shadow-[0_6px_24px_rgba(225,48,108,0.45)] flex flex-col items-center gap-1 border-none">
                <span id="btn-label">存圖 + 複製文字 + 開啟 IG</span>
                <span id="btn-sub" class="text-[11px] font-normal opacity-75">點一下完成全部步驟</span>
            </button>
            <p id="btn-hint" class="text-center text-[10px] text-white/30 mt-2">開啟 IG 後，新增貼文並貼上文字，邀請協作即可獲得獎勵</p>
        </div>

        <!-- 貼文文字（折疊，點開查看） -->
        <div class="px-4 pt-4">
            <button id="toggle-caption" onclick="document.getElementById('caption-box').classList.toggle('hidden'); this.querySelector('span').textContent = document.getElementById('caption-box').classList.contains('hidden') ? '▼' : '▲';"
                class="w-full flex items-center justify-between px-3 py-2 bg-white/5 rounded-xl text-[11px] text-white/50 font-semibold border border-white/10">
                <span>查看 / 編輯貼文文字</span>
                <span>▼</span>
            </button>
            <div id="caption-box" class="hidden mt-2">
                <textarea id="ig-content" class="w-full h-36 bg-black/60 border border-white/10 rounded-xl p-3 text-[11px] text-white/75 resize-none font-mono focus:outline-none focus:border-white/20 leading-relaxed"></textarea>
                <button onclick="copyCaption()" class="w-full mt-2 py-2 bg-white/10 hover:bg-white/15 border border-white/10 rounded-lg text-[11px] text-white/70 font-semibold tracking-wider transition-colors">複製文字</button>
            </div>
        </div>

        <!-- 錯誤狀態（備用） -->
        <div id="error-state" class="hidden text-center py-12 px-4">
            <p class="text-4xl mb-3">🔗</p>
            <p class="text-white/60 text-sm font-bold mb-2">連結無效或已過期</p>
            <p class="text-white/30 text-xs">請在電腦端重新開啟分享視窗</p>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-green-600 text-white text-[13px] font-bold px-5 py-2.5 rounded-xl shadow-xl opacity-0 pointer-events-none transition-all duration-300 whitespace-nowrap"></div>

    <script>
        const API_BASE = window.location.origin;

        function showToast(msg, duration = 2500) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), duration);
        }

        async function copyCaption() {
            const text = document.getElementById('ig-content').value;
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const ta = document.getElementById('ig-content');
                    ta.select(); document.execCommand('copy');
                }
                showToast('✅ 文字已複製！');
            } catch(e) {
                showToast('請手動全選文字後複製');
            }
        }

        async function downloadImage(url) {
            if (!url) return false;
            // resolvedImg 現在是後端代理 URL（/api/stats?action=share_img&...），直接 fetch 不需 proxy_img
            const fetchUrl = (url.startsWith('/') || url.startsWith(API_BASE))
                ? url
                : `${API_BASE}/api/stats?action=proxy_img&url=${encodeURIComponent(url)}`;
            try {
                const resp = await fetch(fetchUrl);
                if (!resp.ok) throw new Error(resp.status);
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = 'loamlab-render.jpg';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 15000);
                return true;
            } catch(e) {
                return false;
            }
        }

        function buildPostText(textData, adminTemplate) {
            const ref = textData.referral_code || '';
            // 優先用 admin 後台設定的模板
            if (adminTemplate) {
                const lang = (navigator.language || 'en').toLowerCase();
                let tmpl = '';
                if (lang.startsWith('zh-tw') || lang.startsWith('zh-hant')) tmpl = adminTemplate.tw;
                else if (lang.startsWith('zh')) tmpl = adminTemplate.cn;
                else if (lang.startsWith('es')) tmpl = adminTemplate.es;
                else if (lang.startsWith('pt')) tmpl = adminTemplate.br;
                else if (lang.startsWith('ja')) tmpl = adminTemplate.jp;
                if (!tmpl) tmpl = adminTemplate.us || Object.values(adminTemplate).find(v => v) || '';
                if (tmpl) return tmpl
                    .replace(/{project}/g, textData.project || '')
                    .replace(/{designer}/g, textData.designer || '')
                    .replace(/{content}/g, textData.content || '')
                    .replace(/{referral_code}/g, ref)
                    .replace(/{ref}/g, ref);
            }
            // 硬編碼 fallback
            const hasDetails = textData.project || textData.designer || textData.content;
            if (hasDetails) {
                return `【 ${textData.project || ''} 】\n\n${textData.content || ''}\n\nDesign: ${textData.designer || ''}\nRenderer: loamlab-camera (SU Realistic Rendering, Multi-angle Gen, Space Reform)\n\n🎁 Try it free & get 100 bonus points:\nhttps://loamlab-camera.vercel.app/?ref=${ref}\n\n#sketchup #architectural #render3d #AIrender`;
            }
            return `Rendered with loamlab-camera — SU Realistic Rendering & Multi-angle Gen\n\n🎁 Try it free & get 100 bonus points:\nhttps://loamlab-camera.vercel.app/?ref=${ref}\n\n#sketchup #architectural #render3d #AIrender`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const ref = params.get('ref') || '';
            const imgParam = params.get('img') || '';
            const dataBase64 = params.get('d') || params.get('data') || '';
            const sessionId = params.get('session') || '';

            if (ref) {
                try {
                    localStorage.setItem('loamlab_referrer_code', ref);
                    document.cookie = `loamlab_ref=${encodeURIComponent(ref)}; path=/; max-age=2592000; SameSite=Lax`;
                } catch(e) {}
            }

            const loadingEl = document.getElementById('loading-state');
            const mainEl = document.getElementById('main-content');
            const imgSection = document.getElementById('img-section');
            const renderImg = document.getElementById('render-img');
            const captionArea = document.getElementById('ig-content');
            const errorEl = document.getElementById('error-state');
            const btnGo = document.getElementById('btn-go');

            // ── 解析資料（session + template 並行）──────────────
            let resolvedImages = []; // 所有圖片
            let captionText = '';
            let adminTemplate = null;
            let igHandle = '@loamlab_barbarian';
            let rewardText = '+300 點';

            // 並行拉 session 與 admin 模板
            const fetchTemplate = fetch(`${API_BASE}/api/stats?action=get_share_template`)
                .then(r => r.json()).catch(() => null);

            if (sessionId) {
                try {
                    const [sessionResp, tmplData] = await Promise.all([
                        fetch(`${API_BASE}/api/stats?action=get_share_session&session=${encodeURIComponent(sessionId)}`).then(r => r.json()),
                        fetchTemplate
                    ]);
                    if (tmplData?.code === 0) {
                        adminTemplate = tmplData.template || null;
                        igHandle = tmplData.config?.ig_handle || igHandle;
                        rewardText = tmplData.config?.reward_text || rewardText;
                    }
                    if (sessionResp?.code === 0) {
                        resolvedImages = sessionResp.images || [];
                        captionText = buildPostText({ ...(sessionResp.text_data || {}), referral_code: ref }, adminTemplate);
                    }
                } catch(e) {}
            } else if (params.has('img') || params.has('d') || params.has('ref')) {
                // 舊版向下相容
                const tmplData = await fetchTemplate;
                if (tmplData?.code === 0) {
                    adminTemplate = tmplData.template || null;
                    igHandle = tmplData.config?.ig_handle || igHandle;
                    rewardText = tmplData.config?.reward_text || rewardText;
                }
                if (imgParam) resolvedImages = [{ type: 'after', url: imgParam }];
                let textData = { referral_code: ref };
                if (dataBase64) {
                    try {
                        const decoded = decodeURIComponent(escape(atob(dataBase64)));
                        const obj = JSON.parse(decoded);
                        textData = { project: obj.p, designer: obj.d, content: obj.c, referral_code: ref };
                    } catch(e) {}
                }
                captionText = buildPostText(textData, adminTemplate);
            } else {
                loadingEl.classList.add('hidden');
                mainEl.classList.remove('hidden');
                errorEl.classList.remove('hidden');
                btnGo.classList.add('hidden');
                return;
            }

            // ── 渲染 UI ──────────────────────────────────────
            loadingEl.classList.add('hidden');
            mainEl.classList.remove('hidden');

            const imgStrip = document.getElementById('img-strip');
            if (resolvedImages.length > 0 && imgStrip) {
                imgStrip.innerHTML = resolvedImages.map((img, i) =>
                    `<img src="${img.url}" alt="render-${i+1}" loading="lazy"
                        style="max-height:200px;border-radius:8px;object-fit:contain;background:#000;flex-shrink:0;scroll-snap-align:start">`
                ).join('');
                imgSection.classList.remove('hidden');
            }
            captionArea.value = captionText;

            const resolvedImg = resolvedImages.find(i => i.type === 'after')?.url || resolvedImages[0]?.url || '';

            // ── 一鍵按鈕邏輯 ──────────────────────────────────
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

            if (resolvedImages.length === 0) {
                document.getElementById('btn-label').textContent = '複製文字 + 開啟 IG';
                document.getElementById('btn-sub').textContent = '點一下完成，開啟後貼上文字';
                document.getElementById('btn-hint').innerHTML = `開啟後邀請 <span class="text-[#e1306c]">${igHandle}</span> 協作即可獲得 ${rewardText}`;
            } else if (isIOS) {
                document.getElementById('img-hint').textContent = `① 長按圖片存入相簿（共 ${resolvedImages.length} 張）`;
                document.getElementById('btn-label').textContent = '② 複製文字 + 開啟 IG';
                document.getElementById('btn-sub').textContent = '確認圖片已存後點此';
            }
            // 更新 btn-hint 為動態 handle / reward
            const btnHintEl = document.getElementById('btn-hint');
            if (btnHintEl) btnHintEl.innerHTML = `開啟 IG 後，新增貼文並貼上文字，邀請 <span class="text-[#e1306c]">${igHandle}</span> 協作即可獲得 ${rewardText}`;

            btnGo.addEventListener('click', async () => {
                btnGo.disabled = true;

                // 優先：原生 navigator.share（多圖一起打包）
                if (resolvedImages.length > 0 && navigator.canShare) {
                    try {
                        const files = [];
                        for (const [i, img] of resolvedImages.entries()) {
                            const fetchUrl = (img.url.startsWith('/') || img.url.startsWith(API_BASE))
                                ? (img.url.startsWith('/') ? API_BASE + img.url : img.url)
                                : `${API_BASE}/api/stats?action=proxy_img&url=${encodeURIComponent(img.url)}`;
                            const resp = await fetch(fetchUrl);
                            if (resp.ok) {
                                const blob = await resp.blob();
                                files.push(new File([blob], `loamlab-render-${i+1}.jpg`, { type: blob.type || 'image/jpeg' }));
                            }
                        }
                        if (files.length > 0) {
                            const shareData = { files, text: captionText };
                            if (navigator.canShare(shareData)) {
                                // 先顯示步驟橫條，引導用戶在 OS 選單選 Instagram
                                document.getElementById('steps-bar')?.classList.remove('hidden');
                                document.getElementById('step-1-text').innerHTML = `在分享選單中點選 <span class="text-[#e1306c] font-bold">Instagram</span>`;
                                document.getElementById('step-3-text').innerHTML = `邀請 <span class="text-[#e1306c]">${igHandle}</span> 協作 → 獲得 ${rewardText}`;
                                await navigator.share(shareData);
                                showToast('✅ 圖文已傳送！', 2500);
                                btnGo.classList.add('done');
                                document.getElementById('btn-label').textContent = '✅ 已完成';
                                document.getElementById('btn-sub').textContent = `前往 IG 貼文並邀請 ${igHandle} 協作`;
                                return;
                            }
                        }
                    } catch(e) {
                        if (e.name === 'AbortError') { btnGo.disabled = false; return; }
                    }
                }

                // Fallback：下載第一張 after 圖
                if (resolvedImg) {
                    const ok = await downloadImage(resolvedImg);
                    if (!ok && isIOS) {
                        showToast('請長按上方圖片存入相簿', 3000);
                    }
                }

                // 複製文字
                let copied = false;
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(captionText);
                        copied = true;
                    } else {
                        captionArea.select();
                        document.execCommand('copy');
                        copied = true;
                    }
                } catch(e) {}

                if (copied) {
                    // 顯示步驟橫條（fallback 流程）
                    const stepsBar = document.getElementById('steps-bar');
                    if (stepsBar) {
                        stepsBar.classList.remove('hidden');
                        document.getElementById('step-1-text').innerHTML = resolvedImg ? `圖片已下載 / 長按圖片存入相簿` : `文字已複製至剪貼板`;
                        document.getElementById('step-3-text').innerHTML = `邀請 <span class="text-[#e1306c]">${igHandle}</span> 協作 → 獲得 ${rewardText}`;
                    }
                    showToast('✅ 文字已複製！正在開啟 IG...', 3000);
                    document.getElementById('btn-label').textContent = '✅ 已複製，開啟中...';
                    document.getElementById('btn-sub').textContent = `貼上文字並邀請 ${igHandle} 協作`;
                    btnGo.classList.add('done');
                } else {
                    showToast('請手動複製下方文字', 2500);
                    document.getElementById('caption-box').classList.remove('hidden');
                    btnGo.disabled = false;
                    return;
                }

                // 步驟三：跳轉 IG（留 1.5s 讓下載/複製完成）
                setTimeout(() => {
                    window.location.href = 'instagram://camera';
                    setTimeout(() => { window.location.href = 'https://www.instagram.com/'; }, 1500);
                }, 1500);
            });
        });
    </script>
</body>
</html>

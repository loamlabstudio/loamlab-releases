<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoamLab 登入中...</title>
    <style>
        body { background: #000; color: #71717a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        p { font-size: 0.9rem; }
    </style>
</head>
<body>
<p>正在準備登入，請稍候...</p>
<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');
    if (!sessionId) { document.querySelector('p').textContent = '錯誤：缺少 session_id'; return; }

    // 若 URL 本身帶有 ref（直接分享的連結），先存起來
    var urlRef = params.get('ref');
    if (urlRef) {
        localStorage.setItem('loamlab_kol_ref', JSON.stringify({ code: urlRef.toUpperCase(), expiry: Date.now() + 30 * 864e5 }));
    }

    // 讀取已存的 KOL ref（30天有效期）
    var kolRef = null;
    try {
        var raw = localStorage.getItem('loamlab_kol_ref');
        if (raw) {
            var parsed = JSON.parse(raw);
            if (Date.now() <= parsed.expiry) kolRef = parsed.code;
            else localStorage.removeItem('loamlab_kol_ref');
        }
    } catch (e) {}

    var loginUrl = '/api/auth/login?session_id=' + encodeURIComponent(sessionId);
    if (kolRef) loginUrl += '&ref=' + encodeURIComponent(kolRef);
    window.location.replace(loginUrl);
})();
</script>
</body>
</html>
